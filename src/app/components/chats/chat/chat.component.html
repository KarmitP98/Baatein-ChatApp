<div *ngIf = "data" class = "content">
	<div class = "avatar">
		<img [src] = "data.avatar" alt = "Avatar">
	</div>
	<div class = "card-body">
		<div class = "card-title">
			{{data.name}}
		</div>
		<div class = "card-text">
			{{data.message}}
		</div>
		<div class = "card-status">
			<!--			<mat-icon>done_all</mat-icon>-->
			<span class = "time">8:43 PM</span>
			<ion-icon color = "primary" name = "checkmark-done" size = "small"></ion-icon>
		</div>
	</div>
</div>
