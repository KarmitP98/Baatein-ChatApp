<div *ngIf = "currentUser" class = "ion-header">
	Hello {{currentUser.name}}
	<ion-button (click) = "this.as.signOut()" fill = "none">
		<ion-icon name = "power"></ion-icon>
	</ion-button>
</div>

<ion-content *ngIf = "currentUser" class = "ion-text-center"
             fullscreen>
	<div class = "content">
		<app-stories></app-stories>
		<app-chats></app-chats>
	</div>
</ion-content>
